version: '3.8'

services:
  # Base de datos con extensión PostGIS
  db:
    image: postgis/postgis:17-3.5
    container_name: geoportal_db
    environment:
      - POSTGRES_DB=catastrogis
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=12345678
    command: 
      - "postgres"
      - "-c"
      - "shared_buffers=1GB"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "work_mem=32MB"
    volumes:
      - geoportal_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

  # GeoServer para servir los mapas
  geoserver:
    image: kartoza/geoserver:2.24.1
    container_name: geoserver
    environment:
      - GEOSERVER_DATA_DIR=/opt/geoserver/data_dir
      - CORS_ENABLED=true
      - CORS_ALLOWED_ORIGINS=*
      # Aumentamos la memoria RAM para manejar las 382 capas
      - JAVA_OPTS=-Xms2g -Xmx4g -Djava.awt.headless=true -XX:+UseG1GC
    volumes:
      - ./geoserver_data:/opt/geoserver/data_dir
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: always

  # Backend (API de Búsqueda)
  api:
    build: ./backend
    container_name: geoportal_api
    environment:
      - DB_USER=postgres
      - DB_PASSWORD=12345678
      - DB_NAME=catastrogis
      - DB_HOST=db
      - DB_PORT=5432
    ports:
      - "3000:3000"
    depends_on:
      - db
    restart: always

  # Frontend (React + Nginx)
  web:
    build: 
      context: ./frontend
      args:
        - VITE_GEOSERVER_URL=/geoserver/geoportal/wms
        - VITE_API_URL=
    container_name: geoportal_frontend
    ports:
      - "80:80"
    depends_on:
      - api
      - geoserver
    restart: always

volumes:
  geoportal_db_data:
